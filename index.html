<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    <!-- Primary Meta -->
    <title>Ship Pro - نظام الشحن الاحترافي</title>
    <meta name="description" content="نظام متكامل لإدارة الشحنات في مصر - تتبع الشحنات، إدارة التجار والمناديب، تسويات مالية آنية" />
    <meta name="keywords" content="شحن, توصيل, تتبع شحنة, نظام شحن, مصر, logistics" />
    <meta name="author" content="Ship Pro" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#3b82f6" />
    
    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Ship Pro - نظام الشحن الاحترافي" />
    <meta property="og:description" content="نظام متكامل لإدارة الشحنات في مصر" />
    <meta property="og:locale" content="ar_EG" />
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ship Pro" />

    <!-- Preconnect to external services -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://uyciwmoavtqmhazhkmmu.supabase.co" />
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
    
    <style>
      * { font-family: 'Cairo', 'Tajawal', sans-serif !important; }
      body { background-color: #f8fafc; margin: 0; padding: 0; }
      
      /* Scrollbar styling */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #f1f5f9; }
      ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #64748b; }
      
      /* Loading splash screen */
      #app-loader {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #0f172a, #1e3a5f);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #app-loader.hidden { opacity: 0; pointer-events: none; }
      .loader-logo {
        width: 60px; height: 60px;
        background: linear-gradient(135deg, #3b82f6, #6366f1);
        border-radius: 16px;
        display: flex; align-items: center; justify-content: center;
        font-size: 28px;
      }
      .loader-text { color: white; font-weight: 800; font-size: 20px; }
      .loader-sub { color: rgba(147,197,253,0.7); font-size: 13px; }
      .loader-spinner {
        width: 32px; height: 32px;
        border: 3px solid rgba(59,130,246,0.3);
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="app-loader">
      <div class="loader-logo">🚚</div>
      <div class="loader-text">Ship Pro</div>
      <div class="loader-sub">نظام الشحن الاحترافي</div>
      <div class="loader-spinner"></div>
    </div>
    
    <div id="root"></div>
    
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function() {
        function hideLoader() {
          var loader = document.getElementById('app-loader');
          if (!loader || loader.classList.contains('hidden')) return;
          loader.classList.add('hidden');
          setTimeout(function() {
            if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
          }, 300);
        }

        // Preferred path: hide only after React successfully mounts.
        window.addEventListener('ship-pro:app-mounted', function() {
          setTimeout(hideLoader, 150);
        });

        // Fallback path: if React mount event never arrives, don't block the screen forever.
        window.addEventListener('load', function() {
          setTimeout(hideLoader, 2500);
        });
      })();
    </script>
  </body>
</html>
